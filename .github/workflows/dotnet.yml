name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Step to ensure the Screenshots and Reports directories exist
    - name: Prepare Screenshots and Reports Directory
      if: failure()  # Only run this if tests fail
      run: |
        echo "Current directory structure:"
        # Ensure the TestResults and its subdirectories exist
        mkdir -p ${{ github.workspace }}/RashmiProject/TestResults/Screenshots
        mkdir -p ${{ github.workspace }}/RashmiProject/TestResults/Reports

        # Log current directory structure for debugging
        ls -R ${{ github.workspace }}/RashmiProject/TestResults
        
        # Check if Screenshots directory has files before copying
        if [ -d "${{ github.workspace }}/RashmiProject/TestResults/Screenshots" ] && [ "$(ls -A ${{ github.workspace }}/RashmiProject/TestResults/Screenshots)" ]; then
          echo "Screenshots found. Copying to the workspace."
          cp -r ${{ github.workspace }}/RashmiProject/TestResults/Screenshots/* ${{ github.workspace }}/TestResults/Screenshots/
        else
          echo "No screenshots found. Skipping screenshot copy operation."
        fi

        # Always attempt to copy the Extent report, even if it's not found.
        echo "Attempting to copy Extent report..."
        if [ -f "${{ github.workspace }}/RashmiProject/Reports/ExtentReport.html" ]; then
          echo "Extent report found. Copying to the workspace."
          cp ${{ github.workspace }}/RashmiProject/Reports/ExtentReport.html ${{ github.workspace }}/TestResults/Reports/ExtentReport.html
        else
          echo "No Extent report found. Creating an empty placeholder file."
          # Create an empty file if the report doesn't exist
          touch ${{ github.workspace }}/TestResults/Reports/ExtentReport.html
        fi

    # Send email notification with screenshot and report attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot and Report Attached"
        body: |
          Hello Developer,
          One or more tests have failed. Please find the screenshot(s) and the Extent report attached for your reference.
          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: |
          ${{ github.workspace }}/TestResults/Screenshots/*
          ${{ github.workspace }}/TestResults/Reports/ExtentReport.html
