name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout Repository
      uses: actions/checkout@v2

    # Step 2: Set up .NET SDK
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0

    # Step 3: Restore project dependencies
    - name: Restore dependencies
      run: dotnet restore

    # Step 4: Build the project
    - name: Build project
      run: dotnet build --no-restore

    # Step 5: Run Tests
    - name: Run Tests
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Step 6: Capture screenshots on failure
    - name: Take screenshot on failure
      if: failure()
      run: |
        mkdir -p ${{ github.workspace }}/screenshots
        cp TestResults/Screenshots/* ${{ github.workspace }}/screenshots/
        echo "Screenshots are saved in ${{ github.workspace }}/screenshots"

    # Step 7: Upload Screenshots as artifacts (Only if failure occurs)
    - name: Upload Screenshots as Artifact
      if: failure()
      uses: actions/upload-artifact@v2
      with:
        name: screenshots
        path: ${{ github.workspace }}/screenshots/*

    # Step 8: Send email notification on failure with screenshots attached
    - name: Send email notification on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,

          One or more tests have failed. Please find the screenshot attached for your reference.

          Regards,
          GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: ${{ github.workspace }}/screenshots/*
