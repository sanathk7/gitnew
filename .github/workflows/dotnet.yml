name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Check if the screenshots directory exists and list it for debugging
    - name: List Screenshots directory content
      run: |
        echo "Listing contents of Screenshots directory:"
        ls -R TestResults/Screenshots/

    # Upload screenshots directory as artifact if there are screenshots
    - name: Upload screenshots as artifacts
      if: always()  # Run even if tests pass or fail
      uses: actions/upload-artifact@v2
      with:
        name: screenshots
        path: TestResults/Screenshots/*

    # Send email notification with screenshot attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,

          One or more tests have failed. Please find the screenshot attached for your reference.

          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: TestResults/Screenshots/*
