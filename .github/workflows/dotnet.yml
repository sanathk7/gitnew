name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout Repository
      uses: actions/checkout@v2  # Stable version

    # Step 2: Set up .NET SDK
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3  # Stable version
      with:
        dotnet-version: 6.0

    # Step 3: Restore project dependencies
    - name: Restore dependencies
      run: dotnet restore

    # Step 4: Build the project
    - name: Build project
      run: dotnet build --no-restore

    # Step 5: Run Tests
    - name: Run Tests
      run: dotnet test RashmiProject.sln --no-build --verbosity normal
