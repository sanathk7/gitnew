name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Debug the issue with the screenshot path
    - name: Debug screenshot path
      run: |
        echo "Screenshot path: ${{ github.workspace }}/TestResults/Screenshots/"

    # Upload screenshots as artifacts if tests fail
    - name: Upload Screenshots Artifact
      if: failure()  # Only upload if the tests fail
      uses: actions/upload-artifact@v2  # Ensure v2 is used or pin to SHA
      with:
        name: screenshots
        path: TestResults/Screenshots/*

    # Send email notification with screenshot
    - name: Send email notification with screenshot
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}  # Your Gmail address
        password: ${{ secrets.GMAIL_PASSWORD }}  # The App Password
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,

          One or more tests have failed. Please find the screenshot attached for your reference.

          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: ${{ github.workspace }}/TestResults/Screenshots/*
