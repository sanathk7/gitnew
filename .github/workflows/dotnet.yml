name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal
    # Step to ensure the Screenshots directory exists and move screenshots to the right path
    - name: Prepare Screenshots Directory
      if: failure()  # Only run this if tests fail
      run: |
        # Ensure the screenshots directory exists
        if [ -d "${{ github.workspace }}/TestResults/Screenshots" ]; then
          # Ensure the destination directory exists
          mkdir -p ${{ github.workspace }}/TestResults/Screenshots
          # Loop through all files in the screenshots directory and copy them
          for screenshot in ${GITHUB_WORKSPACE}/TestResults/Screenshots/*; do
            # Only copy if the file is not already in the destination
            if ! cmp -s "$screenshot" "${GITHUB_WORKSPACE}/TestResults/Screenshots/$(basename $screenshot)"; then
              cp "$screenshot" "${GITHUB_WORKSPACE}/TestResults/Screenshots/"
            fi
          done
        else
          echo "No screenshots found. Skipping copy operation."
        fi
    # Send email notification with screenshot attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,
          One or more tests have failed. Please find the screenshot attached for your reference.
          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: ${{ github.workspace }}/TestResults/Screenshots/*
