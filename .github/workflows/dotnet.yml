name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Upload screenshots as artifacts (even if tests fail)
    - name: Upload screenshots
      if: always()  # Ensure this runs even if tests fail
      uses: actions/upload-artifact@v3
      with:
        name: screenshots
        path: TestResults/Screenshots/  # Path where screenshots are saved

    # Send email notification with screenshot attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot Attached"
        body: "Hello Developer, \n\nOne or more tests have failed. Please find the screenshot attached for your reference."
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: TestResults/Screenshots/*
