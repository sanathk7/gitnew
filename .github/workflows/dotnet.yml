name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Debug step to check directories
    - name: Check directories
      run: |
        echo "Listing files in the workspace:"
        ls -R $GITHUB_WORKSPACE

    # Step to ensure the Screenshots directory exists and move screenshots to the right path
    - name: Prepare Screenshots Directory
      if: failure()  # Only run this if tests fail
      run: |
        echo "Checking for Screenshots directory"
        if [ -d "${GITHUB_WORKSPACE}/RashmiProject/TestResults/Screenshots" ]; then
          echo "Screenshots directory found. Copying screenshots..."
          mkdir -p "${GITHUB_WORKSPACE}/TestResults/Screenshots"
          cp -r "${GITHUB_WORKSPACE}/RashmiProject/TestResults/Screenshots/*" "${GITHUB_WORKSPACE}/TestResults/Screenshots/"
        else
          echo "No screenshots found. Skipping copy operation."
        fi

    # Ensure write permissions for directories
    - name: Ensure write permissions for TestResults
      run: |
        chmod -R 777 ${GITHUB_WORKSPACE}/TestResults
        ls -l ${GITHUB_WORKSPACE}/TestResults  # List files to check permissions

    # Send email notification with screenshot attached (without Extent Report)
    - name: Send email notification with screenshot
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,
          One or more tests have failed. Please find the screenshot attached for your reference.
          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: |
          ${GITHUB_WORKSPACE}/TestResults/Screenshots/*
