name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Ensure the Screenshots and ExtentReports directories exist and move files
    - name: Ensure Screenshots and ExtentReports directories exist and move files
      run: |
        # Debugging output
        echo "GITHUB_WORKSPACE is: ${GITHUB_WORKSPACE}"
        echo "Checking if directory exists: ${GITHUB_WORKSPACE}/TestResults/Screenshots"
        ls -la "${GITHUB_WORKSPACE}/TestResults/"

        # Ensure the screenshots directory exists
        if [ -d "${GITHUB_WORKSPACE}/TestResults/Screenshots" ]; then
          echo "Screenshots directory exists. Proceeding with operation."
          mkdir -p "${GITHUB_WORKSPACE}/TestResults/Screenshots"
          for screenshot in ${GITHUB_WORKSPACE}/TestResults/Screenshots/*; do
            if ! cmp -s "$screenshot" "${GITHUB_WORKSPACE}/TestResults/Screenshots/$(basename $screenshot)"; then
              cp "$screenshot" "${GITHUB_WORKSPACE}/TestResults/Screenshots/"
            fi
          done
        else
          echo "No screenshots found. Skipping copy operation."
        fi  # End of screenshots directory condition

        # Ensure the extent reports directory exists
        echo "Checking if directory exists: ${GITHUB_WORKSPACE}/TestResults/ExtentReports"
        ls -la "${GITHUB_WORKSPACE}/TestResults/"

        if [ -d "${GITHUB_WORKSPACE}/TestResults/ExtentReports" ]; then
          echo "ExtentReports directory exists. Proceeding with operation."
          mkdir -p "${GITHUB_WORKSPACE}/TestResults/ExtentReports"
          for report in ${GITHUB_WORKSPACE}/TestResults/ExtentReports/*; do
            if ! cmp -s "$report" "${GITHUB_WORKSPACE}/TestResults/ExtentReports/$(basename $report)"; then
              cp "$report" "${GITHUB_WORKSPACE}/TestResults/ExtentReports/"
            fi
          done
        else
          echo "No extent reports found. Skipping copy operation."
        fi  # End of extent reports directory condition

    # Debugging: List extent report files before sending email
    - name: List ExtentReports directory contents
      run: |
        echo "Listing extent report files in: ${GITHUB_WORKSPACE}/TestResults/ExtentReports"
        ls -la "${GITHUB_WORKSPACE}/TestResults/ExtentReports"

    # Send email notification with screenshot and extent report attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot and Extent Report Attached"
        body: |
          Hello Developer,
          One or more tests have failed. Please find the screenshot and extent report attached for your reference.
          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: |
          ${{ github.workspace }}/TestResults/Screenshots/*
          ${{ github.workspace }}/TestResults/ExtentReports/*

