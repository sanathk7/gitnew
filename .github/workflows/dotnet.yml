name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Ensure using v2 of checkout

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Take a screenshot on failure
    - name: Take screenshot if failed
      if: failure()  # Only take screenshot on failure
      run: |
        mkdir -p ${{ github.workspace }}/screenshots
        cp TestResults/Screenshots/* ${{ github.workspace }}/screenshots/
        echo "Screenshots are saved in ${{ github.workspace }}/screenshots"

    # Upload screenshots as artifacts
    - name: Upload Screenshots Artifact
      if: failure()  # Only upload screenshots if the tests fail
      uses: actions/upload-artifact@v2  # Use v2 explicitly
      with:
        name: screenshots
        path: ${{ github.workspace }}/screenshots/*

    # Send email notification with screenshot if failure occurs
    - name: Send email notification with screenshot
      if: failure()  # Only send email on failure
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}  # Your Gmail address
        password: ${{ secrets.GMAIL_PASSWORD }}  # The Gmail App password
        subject: "Test Failed - Screenshot Attached"
        body: |
          Hello Developer,

          One or more tests have failed. Please find the screenshot attached for your reference.

          Regards,
          GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}  # Developer's email
        from: ${{ secrets.GMAIL_USERNAME }}  # Your Gmail address
        attachments: ${{ github.workspace }}/screenshots/*
