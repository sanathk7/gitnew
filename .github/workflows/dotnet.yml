name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore

    - name: Give execute permissions to selenium-manager
      run: chmod +x /home/runner/work/gitnew/gitnew/RashmiProject/bin/Debug/net6.0/selenium-manager/linux/selenium-manager

    - name: Run tests with SpecFlow filter
      run: |
        dotnet test RashmiProject.sln --filter "FullyQualifiedName~Features.Happyflow" --no-build --verbosity normal

    # Debugging: List contents of directories for Screenshots and ExtentReports
    - name: List Files in TestResults/Screenshots
      run: ls -la "${GITHUB_WORKSPACE}/TestResults/Screenshots"

    - name: List Files in TestResults/ExtentReports
      run: ls -la "${GITHUB_WORKSPACE}/TestResults/ExtentReports"

    # Check if extent report file exists before proceeding with email
    - name: Wait for Extent Report File
      run: |
        report_file="${GITHUB_WORKSPACE}/TestResults/ExtentReports/extent_report_2025-03-13_05-25-53.html"
        if [ -f "$report_file" ]; then
          echo "Extent report file exists: $report_file"
        else
          echo "Extent report file not found."
          exit 1
        fi

    # Send email notification with screenshot and extent report attached (via Gmail SMTP)
    - name: Send email notification
      if: failure()  # Only send email if the test fails
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.GMAIL_USERNAME }}
        password: ${{ secrets.GMAIL_PASSWORD }}
        subject: "Test Failed - Screenshot and Extent Report Attached"
        body: |
          Hello Developer,
          One or more tests have failed. Please find the screenshot and extent report attached for your reference.
          Regards,
          Your GitHub Actions
        to: ${{ secrets.DEVELOPER_EMAIL }}
        from: ${{ secrets.GMAIL_USERNAME }}
        attachments: |
          ${{ github.workspace }}/TestResults/Screenshots/*
          ${{ github.workspace }}/TestResults/ExtentReports/*

